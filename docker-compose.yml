version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: identify_user
      POSTGRES_PASSWORD: identify_pass
      POSTGRES_DB: identify_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identify_user -d identify_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: "postgresql://identify_user:identify_pass@db:5432/identify_db?schema=public"
    ports:
      - "3000:3000"

volumes:
  pgdata:
